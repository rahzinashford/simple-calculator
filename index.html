<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator" aria-labelledby="calculator-title">
    <h1 id="calculator-title">Simple Calculator</h1>
    <p class="intro">Enter two numbers, choose an operation, and view the result.</p>

    <form id="calculator-form" novalidate>
      <div class="input-group">
        <label for="first-number">First number</label>
        <input type="number" id="first-number" name="first-number" placeholder="e.g. 12" step="any">
      </div>

      <div class="input-group">
        <label for="second-number">Second number</label>
        <input type="number" id="second-number" name="second-number" placeholder="e.g. 4" step="any">
      </div>

      <div class="button-grid" aria-label="Calculator operations">
        <button type="button" data-operation="add">Add (+)</button>
        <button type="button" data-operation="subtract">Subtract (-)</button>
        <button type="button" data-operation="multiply">Multiply (×)</button>
        <button type="button" data-operation="divide">Divide (÷)</button>
      </div>

      <button class="clear-button" type="button" id="clear-button">Clear</button>
    </form>

    <section class="output" aria-live="polite">
      <p id="error-message" class="error-message"></p>
      <p class="result-label">Result</p>
      <p id="result" class="result">—</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
